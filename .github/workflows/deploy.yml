name: Build & Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, gd, curl, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Run Pint lint check
        run: vendor/bin/pint --test --format github

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Publish Filament assets
        run: php artisan filament:assets --no-interaction

      - name: Check migrations
        run: php artisan migrate --pretend --no-interaction
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      - name: Prepare deploy branch
        run: |
          # Remove dev-only files not needed in production
          rm -rf node_modules tests .github

          # Force add vendor and built assets (ignored in main)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B deploy
          git add --force vendor/ public/build/ public/css/ public/js/ public/fonts/
          git add -A
          git commit -m "Deploy: ${GITHUB_SHA::7} — $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: Push deploy branch
        run: git push origin deploy --force
