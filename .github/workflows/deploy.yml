name: Build & Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, json, bcmath, gd, curl, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Publish Filament assets
        run: php artisan filament:assets --no-interaction

      - name: Prepare deploy branch
        run: |
          # Remove dev-only files not needed in production
          rm -rf node_modules tests .github .gitignore .editorconfig .env.example .vscode .codex .gemini .claude .junie *.md .github/workflows *.yml mcp.json boost.json phpunit.xml opencode.json .mcp.json .agents .gitattributes .gitattributes .gitmodules .github/ CODEOWNERS

          # Force add vendor and built assets (ignored in main)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B deploy
          git add --force vendor/ public/build/ public/css/ public/js/ public/fonts/
          git add -A
          git commit -m "Deploy: ${GITHUB_SHA::7} — $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: Push deploy branch
        run: git push origin deploy --force
